<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agile Fragile — Logo Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #151517;
      color: #fff;
      padding: 40px 24px;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #949494; margin-bottom: 32px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1200px;
    }
    .card {
      background: #222;
      border-radius: 8px;
      overflow: hidden;
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      background: #333;
    }
    .card figcaption {
      padding: 16px;
      font-size: 0.9rem;
    }
    .card code {
      display: block;
      margin-top: 8px;
      font-size: 0.8rem;
      color: #818181;
    }
  </style>
</head>
<body>
  <h1>Agile Fragile — Logo Preview</h1>
  <p>Open this file in your browser. All files are in the same folder: <strong>downloads/logos/</strong></p>
  <div class="grid">
    <figure class="card">
      <img src="01-primary-gray.png" alt="Primary gray logo" width="400" height="400">
      <figcaption>Primary (site header)<code>01-primary-gray.png</code></figcaption>
    </figure>
    <figure class="card">
      <img src="02-accent-blue.png" alt="Accent blue logo" width="400" height="400">
      <figcaption>Accent blue<code>02-accent-blue.png</code></figcaption>
    </figure>
    <figure class="card">
      <img src="03-white-background.png" alt="White background logo" width="400" height="400">
      <figcaption>White background<code>03-white-background.png</code></figcaption>
    </figure>
    <figure class="card">
      <img src="04-black-background.png" alt="Black background logo" width="400" height="400">
      <figcaption>Black background<code>04-black-background.png</code></figcaption>
    </figure>
    <figure class="card">
      <img src="05-footer-wordmark.png" alt="Footer wordmark" width="400" height="160">
      <figcaption>Footer wordmark<code>05-footer-wordmark.png</code></figcaption>
    </figure>
    <figure class="card">
      <img src="06-favicon.png" alt="Favicon" width="400" height="400">
      <figcaption>Favicon<code>06-favicon.png</code></figcaption>
    </figure>
  </div>
</body>
</html>
